<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoGPT Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/ant-design-vue@4/dist/reset.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app"></div>

    <script type="text/x-template" id="app-template">
        <div class="console-shell">
            <header class="mobile-appbar">
                <a-button class="mobile-menu-trigger" aria-label="打开操作菜单" @click="mobileMenuOpen = true">
                    <span class="mobile-menu-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M5 7h14M5 12h14M5 17h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                        </svg>
                    </span>
                </a-button>
                <div class="mobile-appbar-brand">
                    <div class="mobile-appbar-title">AutoGPT</div>
                    <div class="mobile-appbar-subtitle">{{ currentTab === 'dashboard' ? '统计中心' : '账号管理' }}</div>
                </div>
                <div class="mobile-appbar-state">
                    <span class="dot" :class="{ active: isRunning }"></span>
                </div>
            </header>

            <a-drawer
                v-model:open="mobileMenuOpen"
                placement="left"
                :width="320"
                class="mobile-menu-drawer"
                title="操作菜单"
            >
                <div class="drawer-stack">
                    <div class="brand-card drawer-brand-card">
                        <div class="brand-mark" aria-hidden="true">
                            <svg viewBox="0 0 48 48" fill="none">
                                <defs>
                                    <linearGradient id="drawerBrandGradient" x1="8" y1="6" x2="40" y2="42" gradientUnits="userSpaceOnUse">
                                        <stop stop-color="#6D5EF7"></stop>
                                        <stop offset="1" stop-color="#2D8CFF"></stop>
                                    </linearGradient>
                                </defs>
                                <rect x="4" y="4" width="40" height="40" rx="14" fill="url(#drawerBrandGradient)"></rect>
                                <path d="M24.8 10.5L15.7 26.2H22.4L20.5 37.5L32.3 21.8H25.8L24.8 10.5Z" fill="white"></path>
                            </svg>
                        </div>
                        <div>
                            <div class="brand-title">AutoGPT</div>
                            <div class="brand-subtitle">Vue Console</div>
                        </div>
                    </div>

                    <a-menu
                        mode="inline"
                        class="nav-menu drawer-nav-menu"
                        :selected-keys="[currentTab]"
                        @click="handleMenuClick"
                    >
                        <a-menu-item key="dashboard">
                            <appstore-outlined></appstore-outlined>
                            <span>仪表盘</span>
                        </a-menu-item>
                        <a-menu-item key="accounts">
                            <team-outlined></team-outlined>
                            <span>账号管理</span>
                        </a-menu-item>
                    </a-menu>

                    <a-card class="sidebar-card" :bordered="false">
                        <template #title>
                            <div class="card-title-inline">
                                <play-circle-outlined></play-circle-outlined>
                                <span>任务控制</span>
                            </div>
                        </template>

                        <div class="control-stack">
                            <div class="field-label">处理数量</div>
                            <a-input-number
                                v-model:value="targetCount"
                                :min="1"
                                :max="50"
                                :controls="false"
                                class="full-width"
                            ></a-input-number>

                            <a-button
                                v-if="!isRunning"
                                type="primary"
                                block
                                class="primary-action"
                                @click="startTask"
                            >
                                <template #icon>
                                    <play-circle-outlined></play-circle-outlined>
                                </template>
                                启动登录上传
                            </a-button>

                            <a-button
                                v-else
                                danger
                                block
                                class="secondary-action"
                                @click="stopTask"
                            >
                                <template #icon>
                                    <pause-circle-outlined></pause-circle-outlined>
                                </template>
                                停止运行
                            </a-button>
                        </div>
                    </a-card>

                    <a-card class="sidebar-card settings-card" :bordered="false">
                        <template #title>
                            <div class="card-title-inline">
                                <setting-outlined></setting-outlined>
                                <span>自动流程</span>
                            </div>
                        </template>

                        <div class="setting-block">
                            <div class="setting-copy">
                                <div class="setting-title">Sub2Api 自动上传</div>
                                <div class="setting-desc">登录成功后自动提交到 Sub2Api</div>
                            </div>
                            <a-switch
                                v-model:checked="settings.sub2api_auto_upload_enabled"
                                :disabled="isRunning || settingsSaving"
                                :loading="settingsSaving"
                                @change="saveAutomationSettings"
                            ></a-switch>
                        </div>

                        <div class="setting-field">
                            <div class="setting-copy">
                                <div class="setting-title">Sub2Api 分组</div>
                                <div class="setting-desc">支持多个分组 ID，使用逗号分隔，例如 `5,8`</div>
                            </div>
                            <a-input
                                v-model:value="settings.sub2api_group_ids_text"
                                :disabled="isRunning || settingsSaving"
                                class="settings-input"
                                placeholder="例如 5"
                                @focus="groupIdsInputFocused = true"
                                @blur="handleGroupIdsBlur"
                                @pressEnter="saveAutomationSettings"
                            ></a-input>
                        </div>

                        <div class="setting-block">
                            <div class="setting-copy">
                                <div class="setting-title">代理 IP</div>
                                <div class="setting-desc">开启后，仅 Codex OAuth 登录链路走此代理</div>
                            </div>
                            <a-switch
                                v-model:checked="settings.proxy_enabled"
                                :disabled="isRunning || settingsSaving"
                                :loading="settingsSaving"
                                @change="saveAutomationSettings"
                            ></a-switch>
                        </div>

                        <div class="setting-field">
                            <div class="setting-copy">
                                <div class="setting-title">代理地址</div>
                                <div class="setting-desc">填写代理 IP 与端口，例如 `127.0.0.1` / `7890`</div>
                            </div>
                            <div class="proxy-fields">
                                <a-input
                                    v-model:value="settings.proxy_host"
                                    :disabled="isRunning || settingsSaving"
                                    class="settings-input"
                                    placeholder="IP"
                                    @pressEnter="saveAutomationSettings"
                                    @blur="saveAutomationSettings"
                                ></a-input>
                                <a-input
                                    v-model:value="settings.proxy_port_text"
                                    :disabled="isRunning || settingsSaving"
                                    class="settings-input proxy-port-input"
                                    inputmode="numeric"
                                    placeholder="端口"
                                    @pressEnter="saveAutomationSettings"
                                    @blur="saveAutomationSettings"
                                ></a-input>
                            </div>
                        </div>

                        <div class="setting-footnote">
                            {{ isRunning ? '任务运行中，暂时不能修改设置' : (settingsSaving ? '设置保存中...' : '空闲时可切换设置') }}
                        </div>
                    </a-card>

                    <div class="drawer-link-grid">
                        <a
                            class="drawer-link-button"
                            href="https://team.joini.cloud/admin/"
                            target="_blank"
                            rel="noopener noreferrer"
                        >
                            Team管理
                        </a>
                        <a
                            class="drawer-link-button"
                            href="https://joini.cloud/"
                            target="_blank"
                            rel="noopener noreferrer"
                        >
                            中转分发
                        </a>
                    </div>

                    <a-button class="drawer-logout-action" danger block @click="handleLogout">
                        <template #icon>
                            <logout-outlined></logout-outlined>
                        </template>
                        退出
                    </a-button>
                </div>
            </a-drawer>

            <aside class="sidebar">
                <div class="brand-card">
                    <div class="brand-mark" aria-hidden="true">
                        <svg viewBox="0 0 48 48" fill="none">
                            <defs>
                                <linearGradient id="brandGradient" x1="8" y1="6" x2="40" y2="42" gradientUnits="userSpaceOnUse">
                                    <stop stop-color="#6D5EF7"></stop>
                                    <stop offset="1" stop-color="#2D8CFF"></stop>
                                </linearGradient>
                            </defs>
                            <rect x="4" y="4" width="40" height="40" rx="14" fill="url(#brandGradient)"></rect>
                            <path d="M24.8 10.5L15.7 26.2H22.4L20.5 37.5L32.3 21.8H25.8L24.8 10.5Z" fill="white"></path>
                        </svg>
                    </div>
                    <div>
                        <div class="brand-title">AutoGPT</div>
                        <div class="brand-subtitle">Vue Console</div>
                    </div>
                </div>

                <a-menu
                    mode="inline"
                    class="nav-menu"
                    :selected-keys="[currentTab]"
                    @click="handleMenuClick"
                >
                    <a-menu-item key="dashboard">
                        <appstore-outlined></appstore-outlined>
                        <span>仪表盘</span>
                    </a-menu-item>
                    <a-menu-item key="accounts">
                        <team-outlined></team-outlined>
                        <span>账号管理</span>
                    </a-menu-item>
                </a-menu>

                <a-card class="sidebar-card" :bordered="false">
                    <template #title>
                        <div class="card-title-inline">
                            <play-circle-outlined></play-circle-outlined>
                            <span>任务控制</span>
                        </div>
                    </template>

                    <div class="control-stack">
                        <div class="field-label">处理数量</div>
                        <a-input-number
                            v-model:value="targetCount"
                            :min="1"
                            :max="50"
                            :controls="false"
                            class="full-width"
                        ></a-input-number>

                        <a-button
                            v-if="!isRunning"
                            type="primary"
                            block
                            class="primary-action"
                            @click="startTask"
                        >
                            <template #icon>
                                <play-circle-outlined></play-circle-outlined>
                            </template>
                            启动登录上传
                        </a-button>

                        <a-button
                            v-else
                            danger
                            block
                            class="secondary-action"
                            @click="stopTask"
                        >
                            <template #icon>
                                <pause-circle-outlined></pause-circle-outlined>
                            </template>
                            停止运行
                        </a-button>
                    </div>
                </a-card>

                <a-card class="sidebar-card settings-card" :bordered="false">
                    <template #title>
                        <div class="card-title-inline">
                            <setting-outlined></setting-outlined>
                            <span>自动流程</span>
                        </div>
                    </template>

                    <div class="setting-block">
                        <div class="setting-copy">
                            <div class="setting-title">Sub2Api 自动上传</div>
                            <div class="setting-desc">登录成功后自动提交到 Sub2Api</div>
                        </div>
                        <a-switch
                            v-model:checked="settings.sub2api_auto_upload_enabled"
                            :disabled="isRunning || settingsSaving"
                            :loading="settingsSaving"
                            @change="saveAutomationSettings"
                        ></a-switch>
                    </div>

                    <div class="setting-field">
                        <div class="setting-copy">
                            <div class="setting-title">Sub2Api 分组</div>
                            <div class="setting-desc">支持多个分组 ID，使用逗号分隔，例如 `5,8`</div>
                        </div>
                        <a-input
                            v-model:value="settings.sub2api_group_ids_text"
                            :disabled="isRunning || settingsSaving"
                            class="settings-input"
                            placeholder="例如 5"
                            @focus="groupIdsInputFocused = true"
                            @blur="handleGroupIdsBlur"
                            @pressEnter="saveAutomationSettings"
                        ></a-input>
                    </div>

                    <div class="setting-block">
                        <div class="setting-copy">
                            <div class="setting-title">代理 IP</div>
                            <div class="setting-desc">开启后，仅 Codex OAuth 登录链路走此代理</div>
                        </div>
                        <a-switch
                            v-model:checked="settings.proxy_enabled"
                            :disabled="isRunning || settingsSaving"
                            :loading="settingsSaving"
                            @change="saveAutomationSettings"
                        ></a-switch>
                    </div>

                    <div class="setting-field">
                        <div class="setting-copy">
                            <div class="setting-title">代理地址</div>
                            <div class="setting-desc">填写代理 IP 与端口，例如 `127.0.0.1` / `7890`</div>
                        </div>
                        <div class="proxy-fields">
                            <a-input
                                v-model:value="settings.proxy_host"
                                :disabled="isRunning || settingsSaving"
                                class="settings-input"
                                placeholder="IP"
                                @pressEnter="saveAutomationSettings"
                                @blur="saveAutomationSettings"
                            ></a-input>
                            <a-input
                                v-model:value="settings.proxy_port_text"
                                :disabled="isRunning || settingsSaving"
                                class="settings-input proxy-port-input"
                                inputmode="numeric"
                                placeholder="端口"
                                @pressEnter="saveAutomationSettings"
                                @blur="saveAutomationSettings"
                            ></a-input>
                        </div>
                    </div>

                    <div class="setting-footnote">
                        {{ isRunning ? '任务运行中，暂时不能修改设置' : (settingsSaving ? '设置保存中...' : '空闲时可切换设置') }}
                    </div>
                </a-card>
            </aside>

            <main class="main-panel">
                <header class="topbar">
                    <div>
                        <div class="page-eyebrow">{{ currentTab === 'dashboard' ? 'System Overview' : 'Account Operations' }}</div>
                        <h1 class="page-title">{{ currentTab === 'dashboard' ? '系统概览' : '账号管理' }}</h1>
                    </div>

                    <div class="topbar-right">
                        <div class="topbar-meta">
                            <div class="meta-chip">
                                <span class="dot" :class="{ active: isRunning }"></span>
                                <span>{{ isRunning ? '系统运行中' : '系统空闲' }}</span>
                            </div>
                            <div class="meta-chip">
                                <clock-circle-outlined></clock-circle-outlined>
                                <span>更新时间 {{ lastUpdate }}</span>
                            </div>
                            <a-button class="logout-action" @click="handleLogout">
                                <template #icon>
                                    <logout-outlined></logout-outlined>
                                </template>
                                退出
                            </a-button>
                        </div>

                        <div class="topbar-tags">
                            <a-tag v-if="currentTab === 'accounts'" color="blue">账号数 {{ accountPagination.total }}</a-tag>
                            <a-tag v-if="currentTab === 'accounts'" :color="settings.sub2api_auto_upload_enabled ? 'cyan' : 'default'">
                                Sub2Api {{ settings.sub2api_auto_upload_enabled ? 'ON' : 'OFF' }}
                            </a-tag>
                            <a
                                class="topbar-link-tag"
                                href="https://team.joini.cloud/admin/"
                                target="_blank"
                                rel="noopener noreferrer"
                                title="打开 Team 管理"
                            >
                                <a-tag color="geekblue">Team管理</a-tag>
                            </a>
                            <a
                                class="topbar-link-tag"
                                href="https://joini.cloud/"
                                target="_blank"
                                rel="noopener noreferrer"
                                title="打开中转分发"
                            >
                                <a-tag color="purple">中转分发</a-tag>
                            </a>
                        </div>
                    </div>
                </header>

                <section v-if="currentTab === 'dashboard'" class="dashboard-page">
                    <div class="stats-grid dashboard-summary-grid">
                        <a-card class="stat-card" :bordered="false">
                            <div class="stat-label">当前步骤</div>
                            <div class="stat-primary">{{ currentAction || '等待启动' }}</div>
                        </a-card>
                        <a-card class="stat-card" :bordered="false">
                            <div class="stat-label">库存总数</div>
                            <div class="stat-number accent">{{ dashboardStats.total || totalInventory }}</div>
                        </a-card>
                        <a-card class="stat-card" :bordered="false">
                            <div class="stat-label">登录成功率</div>
                            <div class="stat-number success">{{ formatDashboardRate(dashboardStats.login_success_rate) }}</div>
                        </a-card>
                        <a-card class="stat-card" :bordered="false">
                            <div class="stat-label">待处理账号</div>
                            <div class="stat-number warning">{{ dashboardStats.pending_accounts }}</div>
                        </a-card>
                        <a-card class="stat-card" :bordered="false">
                            <div class="stat-label">异常账号</div>
                            <div class="stat-number danger">{{ dashboardStats.failed_accounts }}</div>
                        </a-card>
                    </div>

                    <div class="dashboard-insight-grid">
                        <a-card class="panel-card dashboard-stat-panel" :bordered="false">
                            <template #title>
                                <div class="card-title-inline">
                                    <bar-chart-outlined></bar-chart-outlined>
                                    <span>核心统计</span>
                                </div>
                            </template>
                            <template #extra>
                                <a-tag color="blue">本次 {{ successCount }} 成功 / {{ failCount }} 失败</a-tag>
                            </template>

                            <div class="dashboard-stat-blocks">
                                <div class="dashboard-status-block">
                                    <div class="dashboard-status-head">
                                        <span>登录状态</span>
                                        <strong>{{ dashboardStats.login.success }} / {{ dashboardStats.total }}</strong>
                                    </div>
                                    <div class="dashboard-meter">
                                        <span class="meter-fill success" :style="{ width: `${getDashboardPercent(dashboardStats.login, 'success')}%` }"></span>
                                        <span class="meter-fill warning" :style="{ width: `${getDashboardPercent(dashboardStats.login, 'pending')}%` }"></span>
                                        <span class="meter-fill danger" :style="{ width: `${getDashboardPercent(dashboardStats.login, 'failed')}%` }"></span>
                                    </div>
                                    <div class="dashboard-status-meta">
                                        <span>成功 {{ dashboardStats.login.success }}</span>
                                        <span>待验证 {{ dashboardStats.login.pending }}</span>
                                        <span>失败 {{ dashboardStats.login.failed }}</span>
                                        <span>跳过 {{ dashboardStats.login.disabled }}</span>
                                    </div>
                                </div>

                                <div class="dashboard-status-block">
                                    <div class="dashboard-status-head">
                                        <span>Sub2Api 状态</span>
                                        <strong>{{ dashboardStats.sub2api.success }} / {{ dashboardStats.total }}</strong>
                                    </div>
                                    <div class="dashboard-meter">
                                        <span class="meter-fill success" :style="{ width: `${getDashboardPercent(dashboardStats.sub2api, 'success')}%` }"></span>
                                        <span class="meter-fill warning" :style="{ width: `${getDashboardPercent(dashboardStats.sub2api, 'pending')}%` }"></span>
                                        <span class="meter-fill danger" :style="{ width: `${getDashboardPercent(dashboardStats.sub2api, 'failed')}%` }"></span>
                                    </div>
                                    <div class="dashboard-status-meta">
                                        <span>已上传 {{ dashboardStats.sub2api.success }}</span>
                                        <span>待上传 {{ dashboardStats.sub2api.pending }}</span>
                                        <span>失败 {{ dashboardStats.sub2api.failed }}</span>
                                        <span>未启用 {{ dashboardStats.sub2api.disabled }}</span>
                                    </div>
                                </div>

                                <div class="dashboard-status-block">
                                    <div class="dashboard-status-head">
                                        <span>Team 管理（母号）</span>
                                        <strong>{{ dashboardStats.team_manage.success }} / {{ dashboardStats.category.mother }}</strong>
                                    </div>
                                    <div class="dashboard-meter">
                                        <span class="meter-fill success" :style="{ width: `${getDashboardPercent(dashboardStats.team_manage, 'success')}%` }"></span>
                                        <span class="meter-fill warning" :style="{ width: `${getDashboardPercent(dashboardStats.team_manage, 'pending')}%` }"></span>
                                        <span class="meter-fill danger" :style="{ width: `${getDashboardPercent(dashboardStats.team_manage, 'failed')}%` }"></span>
                                    </div>
                                    <div class="dashboard-status-meta">
                                        <span>已上传 {{ dashboardStats.team_manage.success }}</span>
                                        <span>待上传 {{ dashboardStats.team_manage.pending }}</span>
                                        <span>失败 {{ dashboardStats.team_manage.failed }}</span>
                                        <span>未启用 {{ dashboardStats.team_manage.disabled }}</span>
                                    </div>
                                </div>

                                <div class="dashboard-category-strip">
                                    <div>
                                        <span>普号</span>
                                        <strong>{{ dashboardStats.category.normal }}</strong>
                                    </div>
                                    <div>
                                        <span>母号</span>
                                        <strong>{{ dashboardStats.category.mother }}</strong>
                                    </div>
                                    <div>
                                        <span>Plus</span>
                                        <strong>{{ dashboardStats.category.plus }}</strong>
                                    </div>
                                    <div>
                                        <span>Pro</span>
                                        <strong>{{ dashboardStats.category.pro }}</strong>
                                    </div>
                                </div>
                            </div>
                        </a-card>

                        <a-card class="panel-card dashboard-error-panel" :bordered="false">
                            <template #title>
                                <div class="card-title-inline">
                                    <warning-outlined></warning-outlined>
                                    <span>最近异常</span>
                                </div>
                            </template>
                            <template #extra>
                                <a-tag :color="dashboardStats.failed_accounts ? 'red' : 'green'">
                                    {{ dashboardStats.failed_accounts ? `${dashboardStats.failed_accounts} 个异常` : '暂无异常' }}
                                </a-tag>
                            </template>

                            <div class="recent-error-list">
                                <template v-if="dashboardStats.recent_errors.length">
                                    <div v-for="item in dashboardStats.recent_errors" :key="`${item.email}-${item.updatedAt}`" class="recent-error-item">
                                        <div class="recent-error-main">
                                            <div class="recent-error-email">{{ item.email }}</div>
                                            <div class="recent-error-message">{{ item.message || '暂无错误详情' }}</div>
                                        </div>
                                        <div class="recent-error-side">
                                            <a-tag color="red">{{ getDashboardErrorStatusText(item) }}</a-tag>
                                            <span>{{ formatTimeCompact(item.updatedAt) }}</span>
                                        </div>
                                    </div>
                                </template>
                                <a-empty v-else :image="false" description="暂无异常账号"></a-empty>
                            </div>
                        </a-card>
                    </div>

                    <div class="dashboard-log-grid">
                        <a-card class="panel-card" :bordered="false">
                            <template #title>
                                <div class="card-title-inline">
                                    <code-outlined></code-outlined>
                                    <span>终端日志</span>
                                </div>
                            </template>
                            <template #extra>
                                <a-button type="text" @click="clearLogs">清空</a-button>
                            </template>

                            <div class="log-console" ref="logContainerRef">
                                <template v-if="logs.length">
                                    <div v-for="(log, index) in logs" :key="`${index}-${log}`" class="log-entry">
                                        {{ log }}
                                    </div>
                                </template>
                                <a-empty v-else :image="false" description="等待任务启动..."></a-empty>
                            </div>
                        </a-card>
                    </div>
                </section>

                <section v-else class="accounts-page">
                    <a-card class="panel-card accounts-card" :bordered="false">
                        <div class="accounts-toolbar">
                            <div class="accounts-toolbar-main">
                                <a-input
                            v-model:value="accountFilters.keyword"

                                <div class="field-label">验证码方式</div>
                                <a-radio-group
                                    v-model:value="loginUploadForm.otpMode"
                                    :disabled="loginUploadSubmitting"
                                >
                                    <a-radio value="auto">自动获取验证码</a-radio>
                                    <a-radio value="manual">手填验证码</a-radio>
                                </a-radio-group>
                            </div>

                            <div class="login-upload-block">
                                <div class="field-label">上传目标</div>
                                <a-checkbox-group
                                    v-model:value="loginUploadForm.uploadTargets"
                                    :disabled="loginUploadSubmitting"
                                >
                                    <a-checkbox value="sub2api">Sub2Api</a-checkbox>
                                    <a-checkbox
                                        value="team_manage"
                                        :disabled="!(loginUploadRecord && loginUploadRecord.isMotherAccount)"
                                    >
                                        Team 管理
                                    </a-checkbox>
                                </a-checkbox-group>
                            </div>

                            <div v-if="loginUploadForm.otpMode === 'manual'" class="login-upload-block login-otp-block">
                                <div class="field-label">登录验证码</div>
                                <div class="login-otp-status">
                                    <span>{{ loginOtpStatusText || '点击开始登录后等待验证码发送' }}</span>
                                    <a-tag v-if="loginOtpReady" color="green">可填写</a-tag>
                                </div>
                                <div class="login-otp-row">
                                    <a-input
                                        v-model:value="loginUploadForm.otpCode"
                                        :disabled="!loginOtpReady || loginOtpSubmitting || loginUploadCancelling"
                                        inputmode="numeric"
                                        maxlength="6"
                                        placeholder="等待邮件后输入 6 位验证码"
                                        @pressEnter="submitLoginOtp"
                                    ></a-input>
                                    <a-button
                                        type="primary"
                                        :disabled="!loginOtpReady || loginUploadCancelling"
                                        :loading="loginOtpSubmitting"
                                        @click="submitLoginOtp"
                                    >
                                        提交验证码
                                    </a-button>
                                </div>
                                <div class="login-otp-actions">
                                    <a-button
                                        size="small"
                                        :disabled="!loginOtpReady || loginOtpResendRemaining > 0 || loginUploadCancelling"
                                        :loading="loginOtpResending"
                                        @click="resendLoginOtp"
                                    >
                                        {{ loginOtpResendRemaining > 0 ? `${loginOtpResendRemaining}s 后可重发` : '重发验证码' }}
                                    </a-button>
                                </div>
                            </div>
                        </div>
                    </a-modal>
                </section>
            </main>
        </div>
    </script>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
    <script src="https://unpkg.com/dayjs@1/plugin/advancedFormat.js"></script>
    <script src="https://unpkg.com/dayjs@1/plugin/customParseFormat.js"></script>
    <script src="https://unpkg.com/dayjs@1/plugin/localeData.js"></script>
    <script src="https://unpkg.com/dayjs@1/plugin/quarterOfYear.js"></script>
    <script src="https://unpkg.com/dayjs@1/plugin/weekOfYear.js"></script>
    <script src="https://unpkg.com/dayjs@1/plugin/weekYear.js"></script>
    <script src="https://unpkg.com/dayjs@1/plugin/weekday.js"></script>
    <script src="https://unpkg.com/ant-design-vue@4/dist/antd.min.js"></script>
    <script src="https://unpkg.com/@ant-design/icons-vue@7/dist/index.umd.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
